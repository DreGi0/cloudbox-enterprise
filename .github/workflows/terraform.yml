name: CloudBox Enterprise CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Instalar terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.8
      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Terraform init
        run: terraform init
      - name: Terraform format
        run: terraform fmt -check
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        run: terraform plan -lock=false -var="aws_region=us-east-1" -var="project_name=cloudbox-enterprise"
      - name: Terraform apply
        run: terraform apply -auto-approve -lock=false -var="aws_region=us-east-1" -var="project_name=cloudbox-enterprise"
